unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind -n C-Right next-window
bind -n C-Left previous-window
set -g default-terminal "screen-256color"
unbind '"'
unbind %
setw -g mode-keys vi
set-option -g history-limit 100000
setw -g alternate-screen on
set -g renumber-windows on
bind c new-window -c "#{pane_current_path}"

set -g allow-rename off
set-window-option -g automatic-rename off
set-option -g mouse on
#set-option -g window-size latest
set -s escape-time 500
set -g focus-events off
set -g status-style 'bg=colour235 fg=colour255' # Dark grey bg, White fg

# 3. Left Side: Session Name
# Displays session name in bold yellow on a dark background
set -g status-left-length 50
set -g status-left "#[bg=colour235,fg=colour226,bold] ❐ #S #[bg=colour235,fg=colour255,nobold]│ "

# 4. Right Side: Time and Date
# Clean usage of date and time on the right
set -g status-right-length 50
set -g status-right "#[fg=colour255] %H:%M #[fg=colour240]│#[fg=colour255] %d-%b-%y "

# 5. Window Tabs (The "Tabs")
setw -g window-status-separator "" # Remove space between tabs

# Inactive Tab:
# Grey text, subtle, shows index and name
setw -g window-status-format "#[bg=colour235,fg=colour244]  #I:#W  "

# Active Tab (Highlighted):
# Bright Blue background with Bold White text for high contrast
setw -g window-status-current-format "#[bg=colour39,fg=colour255,bold]  #I:#W  "

# Active Pane Border:
# Bright Blue to match the active tab. This makes it obvious which pane has focus.
set -g pane-active-border-style "fg=colour39"

# Inactive Pane Border:
# Dark Grey. Visible enough to see the boundary, but subtle enough to not distract.
set -g pane-border-style "fg=colour240"

set -g pane-border-lines heavy
#if heavy not working try double  
